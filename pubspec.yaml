name: devforge_ai
description: "DevForge AI – AI-Driven Smart Developer Companion"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_generative_ai: ^0.4.7
  flutter_markdown: ^0.7.7+1
  iconsax: ^0.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  shared_preferences: ^2.5.3
  flutter_dotenv: ^5.2.1
  lottie: ^3.1.0
  image_picker: ^1.1.2
  # Only these for now - we'll add others later


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0


# ── Launcher icon config ──────────────────────────────────────────────────────
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#1A1E29"
    theme_color: "#6366F1"
  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/logo.png"


# ── Flutter config ────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/creds/.env
